name: Bug Report
description: Report a bug to help us improve ArcodeX
labels:
  - triage
body:
  - type: markdown
    attributes:
      value: |-
        > [!IMPORTANT]
        > Thanks for taking the time to report a bug!
        >
        > Please search **[existing issues](https://github.com/OwenClaw/ArcodeX/issues)** to see if this bug has already been reported.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |-
        1.
        2.
        3.
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please provide your environment details.
      value: |-
        - **ArcodeX version**:
        - **OS** (e.g., macOS 15.0, Windows 11):
        - **Terminal** (e.g., iTerm2, Ghostty, Windows Terminal):
        - **DevEco Studio version** (if applicable):
        - **Plugins in use**:
    validations:
      required: true

  - type: textarea
    id: screenshot-or-link
    attributes:
      label: Screenshots or share link
      description: Run `/share` to get a share link, or attach a screenshot.
      placeholder: Paste link or drag and drop screenshot here
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Anything else we need to know?
      description: Add any other context about the problem here.
